  <title>إدارة الحجوزات - Rana Eyebrows</title>
  <style>
    :root{--gold:#D4AF37;--gold2:#E8C95E;--rose:#B76E79;--dark:#7A1F2B;--brown:#8C5E58;}

    body{margin:0;min-height:100vh;font-family:Arial,sans-serif;background:linear-gradient(135deg,#FFF8FA,#F9EEF1 45%,#F3E5EA);color:#333;padding:12px;padding-bottom:90px}
    .wrap{width:100%;max-width:980px;margin:0 auto;background:linear-gradient(135deg,#FFF9F5,#FFF2F6 50%,#FFF7EE);border:2px solid var(--gold);border-radius:26px;padding:22px;box-shadow:0 16px 40px rgba(122,31,43,.12),0 8px 24px rgba(212,175,55,.15);overflow:hidden}
    .logo{width:620px;max-width:98%;display:block;margin:0 auto -78px;filter:drop-shadow(0 12px 22px rgba(212,175,55,.22))}

    button,.btn{width:100%;display:block;border:none;border-radius:16px;padding:14px;margin-top:10px;background:var(--rose);color:white;text-decoration:none;text-align:center;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 5px 14px rgba(0,0,0,.12);transition:.18s ease}
    button:hover,.btn:hover{transform:translateY(-1px);filter:brightness(1.03)}
    .gold{background:linear-gradient(135deg,#B8860B,var(--gold),var(--gold2));color:white}.dark{background:linear-gradient(135deg,var(--dark),var(--rose))}.red{background:linear-gradient(135deg,#9F1F2D,#D9534F)}.gray{background:#eee;color:#333;box-shadow:none}
    .message{margin:14px 0;padding:14px;border-radius:16px;background:#fffaf0;border:1px solid var(--gold);color:#6A4E4E;text-align:center;font-weight:900;line-height:1.8}.error{background:#ffe5e5;color:#b30000;border-color:#e0a2a2}
    .hero-card{background:linear-gradient(135deg,#FFF9E8,#FFF4F8);border:1.8px solid var(--gold);border-radius:24px;padding:16px;margin:16px 0;box-shadow:0 10px 24px rgba(183,110,121,.10);text-align:center}.hero-card h3{margin:0 0 8px;color:var(--dark);font-size:19px}.hero-card p{margin:0;color:#6b514c;font-weight:800;line-height:1.8}
    .stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:18px 0 14px}.stat-card{background:linear-gradient(180deg,#FFFFFF,#FFF8F6);border:1.7px solid var(--gold);border-radius:20px;padding:14px 10px;text-align:center;box-shadow:0 8px 20px rgba(183,110,121,.10)}.stat-card strong{display:block;font-size:28px;color:var(--dark);margin-bottom:3px}.stat-card span{color:#8C5E58;font-weight:900;font-size:13px;line-height:1.6}
    .top-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:14px 0 16px}.top-actions button{margin:0}
    .tabs{position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#FFF7FA,#FFF2F6);border:1.8px solid var(--gold);border-radius:22px;padding:10px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:14px 0 18px;box-shadow:0 12px 26px rgba(122,31,43,.10)}
    .tab-btn{margin:0!important;padding:12px 8px!important;border-radius:15px!important;background:#fff!important;color:var(--dark)!important;border:1.3px solid #E8C95E!important;box-shadow:0 6px 14px rgba(183,110,121,.08)!important;font-size:13.5px!important;line-height:1.4}.tab-btn.active{background:linear-gradient(135deg,var(--dark),var(--rose),var(--gold))!important;color:white!important;border-color:white!important;transform:translateY(-1px)}
    .section-head{background:linear-gradient(135deg,var(--dark),var(--rose));color:white;border-radius:22px;padding:16px;margin:16px 0 12px;text-align:center;box-shadow:0 10px 22px rgba(122,31,43,.16)}.section-head h2{margin:0 0 6px;color:white;font-size:22px}.section-head p{margin:0;font-weight:800;opacity:.95;line-height:1.7}
    .admin-card{background:linear-gradient(180deg,#FFFFFF,#FFF8F6);border:1.8px solid var(--gold);border-radius:24px;padding:16px;margin:13px 0;box-shadow:0 10px 25px rgba(183,110,121,.12);text-align:right}.admin-card h3{margin:0 0 9px;text-align:right;color:var(--dark);font-size:18px;line-height:1.5}
    .status-pill{display:inline-block;border-radius:999px;padding:7px 12px;font-weight:900;margin:6px 0 8px;font-size:14px}.status-pending{background:#FFF4E5;color:#B8860B;border:1px solid #E2B84C}.status-approved{background:#EFFFF7;color:#1F8A5B;border:1px solid #7ED9A8}.status-done{background:#EAF4FF;color:#2C5F9E;border:1px solid #98C8F2}.status-cancelled{background:#F3F3F3;color:#666;border:1px solid #DDD}
    .date-badge{display:inline-block;background:#FFF9E8;border:1px solid var(--gold);border-radius:999px;padding:6px 11px;color:#8C5E58;font-weight:900;font-size:13px;margin:4px 0 8px}.reminder-badge{display:inline-block;background:#EFFFF7;color:#1F8A5B;border:1px solid #7ED9A8;border-radius:999px;padding:6px 10px;font-weight:900;font-size:13px;margin:6px 0 8px}
    .details{line-height:2;color:#444;font-size:15px;margin-top:4px}.actions{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:13px}.actions button,.actions .btn{margin:0;padding:11px 8px;font-size:14px;border-radius:14px}
    .empty{background:#fffaf0;border:1.5px dashed var(--gold);border-radius:18px;padding:22px;text-align:center;color:var(--brown);font-weight:900;margin:12px 0;line-height:1.8}
    .back-top-btn{position:fixed;right:16px;bottom:18px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#7A1F2B,#B76E79,#D4AF37);color:white;border:1.5px solid rgba(255,255,255,.65);box-shadow:0 10px 24px rgba(122,31,43,.28);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;z-index:99999;cursor:pointer;padding:0;margin:0}
    .lux-modal{display:none;position:fixed;inset:0;background:rgba(20,10,12,.55);z-index:999999;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(3px)}.lux-box{width:92%;max-width:450px;background:linear-gradient(180deg,#FFFFFF,#FFF7FA);border:2px solid var(--gold);border-radius:28px;padding:26px 22px;text-align:center;box-shadow:0 22px 65px rgba(122,31,43,.32);animation:pop .22s ease}.lux-icon{width:76px;height:76px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;color:white;font-size:34px;background:linear-gradient(135deg,var(--dark),var(--rose),var(--gold));box-shadow:0 12px 28px rgba(212,175,55,.34)}.lux-title{color:#8C5E58;font-size:24px;font-weight:900;margin:8px 0 8px}.lux-text{color:#666;font-size:17px;line-height:1.9;font-weight:800;margin:0 0 12px}.lux-badge{display:inline-block;background:#FFF9E8;border:1.5px solid var(--gold);color:var(--dark);border-radius:999px;padding:9px 14px;font-weight:900;margin:8px 0 16px;line-height:1.7}.lux-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.lux-actions button{margin:0!important}
    @keyframes pop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}

    .search-box{
      background:linear-gradient(135deg,#FFFFFF,#FFF9F4);
      border:1.8px solid var(--gold);
      border-radius:22px;
      padding:14px;
      margin:14px 0;
      box-shadow:0 8px 20px rgba(183,110,121,.10);
    }
    .search-box label{
      display:block;
      color:var(--dark);

    }
    .search-box input{

    }
    .search-hint{

      text-align:center;
    }
    .subfilters{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:8px;
      margin:12px 0;
    }
    .subfilters button{
      margin:0!important;
      padding:10px 8px!important;
      border-radius:14px!important;

      background:#fff!important;

      border:1.3px solid #E8C95E!important;
      box-shadow:0 5px 12px rgba(183,110,121,.08)!important;
    }
    .subfilters button.active{
      background:linear-gradient(135deg,var(--dark),var(--rose),var(--gold))!important;
      color:white!important;
    }
    .urgency-badge{
      display:inline-block;
      border-radius:999px;
      padding:6px 10px;
      font-weight:900;
      font-size:13px;
      margin:4px 4px 8px 0;
      background:#FFF4E5;
      border:1px solid #E2B84C;
      color:#B8860B;
    }
    .note-box{
      background:#FFF9E8;
      border:1px solid var(--gold);
      color:#6b514c;
      border-radius:14px;
      padding:10px 12px;
      margin:10px 0;
      line-height:1.8;

    }
    .copy-mini{
      background:linear-gradient(135deg,#5D3A3F,#8C5E58)!important;
    }

    .top-actions button{
      min-height:58px !important;

/* ===== Rana Date Agenda Mobile Tool ===== */
.date-agenda-box{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at top right,rgba(212,175,55,.30),transparent 28%),
    radial-gradient(circle at bottom left,rgba(183,110,121,.18),transparent 24%),
    linear-gradient(135deg,#FFFFFF,#FFF8FB 55%,#FFF8EF);
  border:1.8px solid var(--gold);
  border-radius:30px;
  padding:18px;
  margin:16px 0;
  box-shadow:0 18px 38px rgba(122,31,43,.12);
}
.date-agenda-box:before{content:"📅";position:absolute;left:18px;top:14px;font-size:28px;opacity:.14}
.date-agenda-box label{display:block;text-align:center;color:var(--dark);font-weight:900;margin-bottom:12px;font-size:19px;}
.date-agenda-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;}
.date-agenda-row input{
  margin:0!important;min-height:58px!important;border:1.7px solid var(--gold)!important;border-radius:20px!important;
  background:linear-gradient(135deg,#fff,#fffaf3)!important;color:#7A1F2B!important;font-weight:900!important;text-align:center!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.65),0 10px 18px rgba(122,31,43,.06)!important;
}
.date-agenda-row button{width:auto!important;min-width:132px;margin:0!important;border-radius:20px!important;padding:16px 14px!important;box-shadow:0 12px 22px rgba(212,175,55,.22)!important;}
.date-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:14px 0;}
.date-summary-card{
  background:linear-gradient(135deg,#fff,#fffaf3);border:1.4px solid rgba(212,175,55,.9);border-radius:22px;padding:14px 8px;text-align:center;
  box-shadow:0 12px 24px rgba(183,110,121,.10);
}
.date-summary-card strong{display:block;color:#7A1F2B;font-size:26px;margin-bottom:4px;}
.date-summary-card span{color:#8C5E58;font-weight:900;font-size:12px;line-height:1.5;}
@media(max-width:640px){
  .date-agenda-row{grid-template-columns:1fr;}
  .date-agenda-row button{width:100%!important;}
  .date-summary{grid-template-columns:1fr 1fr;}
}


.top-actions{grid-template-columns:repeat(4,minmax(0,1fr))!important;}@media(max-width:640px){.top-actions{grid-template-columns:1fr!important;}}

/* ===== Rana V42 Professional Confirm Modal ===== */
.rana-confirm-overlay{
  position:fixed;
  inset:0;
  background:rgba(64,32,39,.42);
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:99999;
}
.rana-confirm-overlay.show{display:flex;animation:ranaFadeIn .18s ease-out;}
.rana-confirm-card{
  width:min(92vw, 460px);
  background:linear-gradient(180deg,#fffafc 0%, #fff 100%);
  border:1.5px solid rgba(201,160,31,.28);
  border-radius:28px;
  box-shadow:0 24px 70px rgba(88,30,45,.22), 0 8px 28px rgba(0,0,0,.08);
  padding:24px 22px 20px;
  text-align:center;
  direction:rtl;
  transform:translateY(10px) scale(.98);
  animation:ranaPopIn .18s ease-out forwards;
}
.rana-confirm-icon{
  width:68px;height:68px;border-radius:50%;margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#8d1e36 0%,#d18a2b 100%);
  color:#fff;font-size:30px;box-shadow:0 10px 24px rgba(141,30,54,.22);
}
.rana-confirm-title{margin:0 0 8px;font-size:28px;font-weight:900;color:#7a1f2b;}
.rana-confirm-text{margin:0 auto 18px;max-width:32ch;line-height:1.9;color:#6c4b53;font-size:17px;}
.rana-confirm-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.rana-confirm-actions button{
  min-width:132px;border:none;border-radius:999px;padding:13px 22px;font-size:16px;font-weight:800;cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
}
.rana-confirm-actions button:hover{transform:translateY(-1px);}
.rana-confirm-actions .cancel{
  background:#f7e9ee;color:#8d3550;border:1px solid rgba(141,53,80,.15);
}
.rana-confirm-actions .confirm{
  background:linear-gradient(90deg,#8d1e36 0%,#d18a2b 100%);color:#fff;
  box-shadow:0 10px 24px rgba(141,30,54,.24);
}
@keyframes ranaFadeIn{from{opacity:0}to{opacity:1}}
@keyframes ranaPopIn{from{opacity:0;transform:translateY(12px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ===== Rana V43 Delete Experience Upgrade ===== */
.rana-confirm-card{
  position:relative;
  overflow:hidden;
}
.rana-confirm-card:before{
  content:"";
  position:absolute;
  inset:-2px;
  background:radial-gradient(circle at top right, rgba(212,175,55,.22), transparent 32%),
             radial-gradient(circle at bottom left, rgba(122,31,43,.16), transparent 38%);
  pointer-events:none;
}
.rana-confirm-card > *{position:relative;z-index:1;}
.rana-confirm-icon{
  animation:ranaIconFloat 1.9s ease-in-out infinite;
}
.rana-confirm-actions .confirm{
  position:relative;
  overflow:hidden;
}
.rana-confirm-actions .confirm:after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,.35), transparent);
  transform:translateX(120%);
  animation:ranaButtonShine 2.3s ease-in-out infinite;
}
.rana-action-toast{
  position:fixed;
  top:22px;
  left:50%;
  transform:translateX(-50%) translateY(-12px);
  min-width:min(92vw, 340px);
  max-width:92vw;
  z-index:100000;
  display:none;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:13px 18px;
  border-radius:999px;
  direction:rtl;
  text-align:center;
  font-weight:900;
  font-size:15px;
  color:#fff;
  box-shadow:0 16px 42px rgba(90,35,48,.22);
  border:1px solid rgba(255,255,255,.45);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  opacity:0;
}
.rana-action-toast.show{
  display:flex;
  animation:ranaToastIn .22s ease-out forwards;
}
.rana-action-toast.success{
  background:linear-gradient(135deg,#2f9e64,#4fcf8a);
}
.rana-action-toast.error{
  background:linear-gradient(135deg,#9d223c,#d64a62);
}
.rana-action-toast.loading{
  background:linear-gradient(135deg,#7a1f2b,#d18a2b);
}
.rana-toast-spinner{
  width:18px;
  height:18px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,.38);
  border-top-color:#fff;
  animation:ranaSpin .8s linear infinite;

function ranaDisplayPhoneLocalV61(phone){
  const original = String(phone || '').trim();
  let p = original.replace(/\D/g, '');
  if (!p) return original;

  // 97250xxxxxxx -> 050xxxxxxx
  if (p.startsWith('972') && p.length >= 12) {
    return '0' + p.substring(3);
  }

  // 502595959 -> 0502595959
  if (p.length === 9 && p.startsWith('5')) {
    return '0' + p;
  }

  // already local
  if (p.length === 10 && p.startsWith('0')) {
    return p;
  }

  return original || p;
}


function api(action, params={}){
  return new Promise((resolve,reject)=>{
    const cb="__rana_admin_cb_"+Date.now()+"_"+Math.floor(Math.random()*100000);
    const q=new URLSearchParams(); q.set("api","1"); q.set("action",action); q.set("callback",cb);
    Object.keys(params).forEach(k=>q.set(k,params[k]==null?"":String(params[k])));
    const script=document.createElement("script");
    const timer=setTimeout(()=>{cleanup();reject(new Error("timeout"));},25000);
    function cleanup(){clearTimeout(timer);try{delete window[cb];}catch(e){window[cb]=undefined;} if(script.parentNode)script.parentNode.removeChild(script);}
    window[cb]=function(data){cleanup();resolve(data);};
    script.onerror=function(){cleanup();reject(new Error("network"));};
    script.src=GAS_URL+"?"+q.toString(); document.head.appendChild(script);
  });
}

function normalizeSearchText(s){
  return String(s || "")
    .toLowerCase()
    .replace(/[^\u0600-\u06FFa-z0-9]/g, "");
}

}

function bookingMatchesSearch(b){
  const q = normalizeSearchText(adminSearchTerm);
  if (!q) return true;

  const hay = normalizeSearchText([
    b.name, b.phone, ranaDisplayPhoneLocalV61(b.phone), b.code, b.service, b.date, b.time, b.status, b.statusView, b.notes
  ].join(" "));

  return hay.includes(q);
}

function parseBookingDate(b){
  const d = String(b.date || "").split("-");
  const t = String(b.time || "00:00").split(":");
  if (d.length < 3) return null;
  return new Date(Number(d[0]), Number(d[1])-1, Number(d[2]), Number(t[0]||0), Number(t[1]||0), 0, 0);
}

function startOfDay(d){
  const x = new Date(d);
  x.setHours(0,0,0,0);
  return x;
}

function urgencyBadge(b){
  const dt = parseBookingDate(b);
  if (!dt) return "";
  const today = startOfDay(new Date());
  const day = startOfDay(dt);
  const diff = Math.round((day - today) / 86400000);

  if (diff === 0) return '<div class="urgency-badge">📌 اليوم</div>';
  if (diff === 1) return '<div class="urgency-badge">🌸 بكرا</div>';
  if (diff > 1 && diff <= 7) return '<div class="urgency-badge">⏰ قريب جدًا</div>';
  return "";
}

function applyUpcomingFilter(rows){
  if (currentTab !== "upcoming") return rows;

  const today = startOfDay(new Date());

  return rows.filter(function(b){
    const dt = parseBookingDate(b);
    if (!dt) return true;
    const diff = Math.round((startOfDay(dt) - today) / 86400000);

    if (upcomingFilter === "week") return diff >= 0 && diff <= 7;
    if (upcomingFilter === "next") return diff >= 8 && diff <= 14;
    return true;
  });
}

function formatDurationSmart(minutes){
  const n = Number(minutes || 0);
  if (!n || isNaN(n)) return "";
  const h = Math.floor(n / 60);
  const m = n % 60;
  if (h && m) return h + " ساعة و " + m + " دقيقة";
  if (h) return h + (h === 1 ? " ساعة" : " ساعات");
  return m + " دقيقة";
}

function ranaPad(n){
  return String(n).padStart(2, "0");
}

function ranaIsoFromDate(d){
  return d.getFullYear() + "-" + ranaPad(d.getMonth()+1) + "-" + ranaPad(d.getDate());
}

function ranaParseIso(iso){
  const p = String(iso || "").split("-");
  if (p.length !== 3) return new Date();
  return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
}

function ranaHebrewMonthName(monthIndex){
  const names = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  return names[monthIndex] || "";
}

function ranaCalendarHtml(){
  if (!selectedAgendaDate) selectedAgendaDate = todayIso();
  if (!ranaCalViewDate) ranaCalViewDate = ranaParseIso(selectedAgendaDate);

  const y = ranaCalViewDate.getFullYear();
  const m = ranaCalViewDate.getMonth();
  const first = new Date(y, m, 1);
  const last = new Date(y, m + 1, 0);
  const startDay = first.getDay();
  const today = ranaIsoFromDate(new Date());
  const selected = selectedAgendaDate;

  let cells = "";
  for (let i=0; i<startDay; i++) cells += '<div class="rana-cal-day empty"></div>';

  for (let d=1; d<=last.getDate(); d++){
    const iso = y + "-" + ranaPad(m+1) + "-" + ranaPad(d);
    const cls = [
      "rana-cal-day",
      iso === selected ? "selected" : "",
      iso === today ? "today" : ""
    ].filter(Boolean).join(" ");
    cells += `<div class="${cls}" onclick="ranaPickAgendaDate('${iso}')">${d}</div>`;
  }

  return `
    <div class="rana-cal">
      <div class="rana-cal-head">
        <button class="dark" onclick="ranaChangeCalMonth(-1)">‹</button>
        <div class="rana-cal-title">${ranaHebrewMonthName(m)} ${y}</div>
        <button class="dark" onclick="ranaChangeCalMonth(1)">›</button>
      </div>
      <div class="rana-cal-days">
        <div>أحد</div><div>اثنين</div><div>ثلاثاء</div><div>أربعاء</div><div>خميس</div><div>جمعة</div><div>سبت</div>
      </div>
      <div class="rana-cal-grid">${cells}</div>
      <div class="rana-cal-picked">التاريخ المختار: ${selectedAgendaDate}</div>
    </div>
  `;
}

function ranaChangeCalMonth(delta){
  if (!ranaCalViewDate) ranaCalViewDate = ranaParseIso(selectedAgendaDate || todayIso());
  ranaCalViewDate = new Date(ranaCalViewDate.getFullYear(), ranaCalViewDate.getMonth() + delta, 1);

}


function ranaBookingDateTimeValue(b){
  const dt = parseBookingDate(b);

function ranaSortNearestFirst(rows){

function ranaStatusViewLocal(status, b){
  status = String(status || "").trim();
  if (status === "تمت الموافقة") return "موعد مؤكد ✅";
  if (status === "بانتظار الموافقة") return "بانتظار التأكيد ⏳";

  if (status === "ملغي" || status === "Cancelled" || status === "Canceled") return "تم إلغاء الموعد";
  if (status === "تمت الزيارة") return "تمّت الزيارة ✨";
  return status;
}

function ranaIsTodayOrFutureLocal(b){
  return String(b.date || "") >= todayIso();
}

function ranaIsTomorrowLocal(b){
  const d = new Date();
  d.setDate(d.getDate() + 1);
  const tomorrow = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  return String(b.date || "") === tomorrow;
}

function ranaIsCancelledLocal(b){
  const s = String(b.status || "");
  return s === "ملغي" || s === "مرفوض" || s === "Cancelled" || s === "Canceled";
}

function ranaIsPastDoneLocal(b){
  const s = String(b.status || "");
  const sv = String(b.statusView || "");
  if (s === "تمت الزيارة" || sv.includes("زيارة")) return true;
  const dt = parseBookingDate(b);
  return s === "تمت الموافقة" && dt && dt.getTime() < Date.now();
}

function ranaRebuildAdminBucketsLocal(){
  if (!adminData) return;
  const rows = allBookingsUnique();

  const result = {
    pending: [],
    today: [],
    tomorrow: [],
    upcoming: [],
    cancelled: [],
    past: []
  };

  rows.forEach(function(b){
    if (!b || !b.id) return;

    const s = String(b.status || "");
    const cancelled = ranaIsCancelledLocal(b);
    const donePast = ranaIsPastDoneLocal(b);
    const futureOrToday = ranaIsTodayOrFutureLocal(b);

    if (s === "بانتظار الموافقة") result.pending.push(b);
    if (String(b.date || "") === todayIso() && !cancelled) result.today.push(b);
    if (ranaIsTomorrowLocal(b) && !cancelled) result.tomorrow.push(b);

    if (futureOrToday && !cancelled && !donePast) {
      result.upcoming.push(b);
    }

    if (cancelled) result.cancelled.push(b);
    if (donePast) result.past.push(b);
  });

  function sortAsc(a,b){ return String((a.date||"") + " " + (a.time||"")).localeCompare(String((b.date||"") + " " + (b.time||""))); }
  function sortDesc(a,b){ return sortAsc(b,a); }

  result.pending.sort(sortAsc);
  result.today.sort(sortAsc);
  result.tomorrow.sort(sortAsc);
  result.upcoming.sort(sortAsc);
  result.cancelled.sort(sortDesc);
  result.past.sort(sortDesc);

  adminData = result;
}

function ranaFindBookingLocal(id){
  const rows = allBookingsUnique();
  id = String(id || "");
  return rows.find(function(b){ return String(b.id || "") === id; });
}

function ranaApplyStatusLocal(id, status){
  const b = ranaFindBookingLocal(id);
  if (!b) return false;
  b.status = status;
  b.statusView = ranaStatusViewLocal(status, b);
  if (status !== "تمت الموافقة") {
    b.approvalSent = "";
    b.approvalWhatsappSent = "";
  }
  ranaRebuildAdminBucketsLocal();
  ranaRenderCurrentFast();
  return true;
}

function ranaApplyApprovalSentLocal(id, sent){
  const b = ranaFindBookingLocal(id);
  if (!b) return false;
  b.approvalSent = sent ? "تم الإرسال" : "";
  b.approvalWhatsappSent = sent ? "تم الإرسال" : "";
  if (sent) localStorage.setItem(approvalSentKey(id), "1");
  else localStorage.removeItem(approvalSentKey(id));
  ranaRenderCurrentFast();
  return true;
}

/* ===== Rana V12 wrong password stays on page ===== */
(function wrapLoginV12(){
  const names = ["adminLogin","loginAdmin","checkAdminPassword","dashboardPage"];
  names.forEach(function(fn){
    if (typeof window[fn] === "function" && !window[fn].__v12Wrapped) {
      const old = window[fn];
      const wrapped = async function(){
        try {
          const r = await old.apply(this, arguments);
          return r;
        } catch(e) {
          const txt = String(e && e.message || e || "");
          if (txt.includes("كلمة") || txt.includes("password") || txt.includes("سر")) {
            passwordErrorV12();
            return false;
          }
          throw e;
        }
      };
      wrapped.__v12Wrapped = true;
      window[fn] = wrapped;
    }
  });
  setTimeout(wrapLoginV12, 500);
})();

<script>
/* ===== Rana V13 daily summary ===== */
function ranaMinutesFromTimeV13(t){
  const m = String(t || "").match(/(\d{1,2}):(\d{2})/);
  if (!m) return 99999;
  return Number(m[1]) * 60 + Number(m[2]);
}
function ranaFormatMinutesV13(total){
  total = Number(total || 0);
  const h = Math.floor(total / 60);
  const m = total % 60;
  if (h && m) return h + "س " + m + "د";
  if (h) return h + "س";
  return m + "د";
}
function ranaTodaySummaryRowsV13(){
  if (!adminData) return [];
  return (adminData.today || []).slice().filter(function(b){
    const s = String(b.status || "");
    return s !== "ملغي" && s !== "مرفوض";
  }).sort(function(a,b){ return ranaMinutesFromTimeV13(a.time) - ranaMinutesFromTimeV13(b.time); });
}
function renderDailySummaryV13(){
  if (!adminData) return;
  const old = document.getElementById("dailySummaryV13");
  if (old) old.remove();
  const rows = ranaTodaySummaryRowsV13();
  const count = rows.length;
  const first = count ? rows[0].time : "—";
  const last = count ? rows[count-1].time : "—";
  const totalDuration = rows.reduce(function(sum,b){ return sum + Number(b.duration || 0); }, 0);
  const html = `
    <div id="dailySummaryV13" class="daily-summary-v13">
      <div class="daily-summary-title-v13">ملخص اليوم ✨</div>
      <div class="daily-summary-grid-v13">

        <div class="daily-summary-item-v13"><strong>${first}</strong><span>أول موعد</span></div>
        <div class="daily-summary-item-v13"><strong>${last}</strong><span>آخر موعد</span></div>
        <div class="daily-summary-item-v13"><strong>${ranaFormatMinutesV13(totalDuration)}</strong><span>إجمالي الوقت</span></div>
      </div>
      <div class="daily-summary-note-v13">${count ? "ابدئي من أقرب موعد، وتابعي حجوزات اليوم من زر حجوزات اليوم." : "لا توجد حجوزات نشطة لليوم حالياً."}</div>
    </div>`;
  const target = document.querySelector(".clean-nav-box") || document.querySelector(".stats-grid") || document.querySelector(".hero-card");
  if (target) target.insertAdjacentHTML("afterend", html);
}
(function wrapDashboardSummaryV13(){
  if (typeof dashboardPage === "function" && !dashboardPage.__v13SummaryWrapped) {
    const oldDashboard = dashboardPage;
    dashboardPage = async function(){
      const r = await oldDashboard.apply(this, arguments);
      setTimeout(renderDailySummaryV13, 100);
      return r;
    };
    dashboardPage.__v13SummaryWrapped = true;
  } else {
    setTimeout(wrapDashboardSummaryV13, 300);
  }
})();
document.addEventListener("DOMContentLoaded", function(){ setTimeout(renderDailySummaryV13, 1200); });
</script>

<script>
/* ===== Rana V23: fixes mobile calendar + keep scroll on summary ===== */
(function(){
  let v23TopCalendarOpen = false;

  function v23Label(iso){
    if (!iso) return '';
    const p = String(iso).split('-');
    if (p.length !== 3) return iso;
    return p[2] + '/' + p[1] + '/' + p[0];
  }
  function v23IsToday(iso){ return String(iso || '') === String(todayIso()); }
  function v23RowsForDate(iso, includeCancelled){
    if (!adminData) return [];
    return allBookingsUnique()
      .filter(function(b){ return String(b.date || '') === String(iso || ''); })
      .filter(function(b){
        if (includeCancelled) return true;
        const s = String(b.status || '');
        return s !== 'ملغي' && s !== 'مرفوض';
      })
      .sort(function(a,b){ return ranaMinutesFromTimeV13(a.time) - ranaMinutesFromTimeV13(b.time); });
  }

  function v23CalendarHtml(){
    if (!v23TopCalendarOpen) return '';
    if (!selectedAgendaDate) selectedAgendaDate = todayIso();
    if (!ranaCalViewDate) ranaCalViewDate = ranaParseIso(selectedAgendaDate);
    const y = ranaCalViewDate.getFullYear();
    const m = ranaCalViewDate.getMonth();
    const first = new Date(y, m, 1);
    const last = new Date(y, m + 1, 0);
    const startDay = first.getDay();
    const today = ranaIsoFromDate(new Date());
    const selected = selectedAgendaDate;
    let cells = '';
    for (let i=0; i<startDay; i++) cells += '<div class="v23-cal-day empty"></div>';
    for (let d=1; d<=last.getDate(); d++){
      const iso = y + '-' + ranaPad(m+1) + '-' + ranaPad(d);
      const cls = ['v23-cal-day', iso === selected ? 'selected' : '', iso === today ? 'today' : ''].filter(Boolean).join(' ');
      cells += `<div class="${cls}" onclick="event.stopPropagation(); v23PickTopDate('${iso}')">${d}</div>`;
    }
    return `
      <div id="v23TopCalendar" class="v23-top-calendar" onclick="event.stopPropagation();">
        <div class="v23-cal-head">
          <button type="button" class="v23-cal-nav" onclick="event.stopPropagation(); v23ChangeTopCalendarMonth(-1)">‹</button>
          <div class="v23-cal-title">${ranaHebrewMonthName(m)} ${y}</div>
          <button type="button" class="v23-cal-nav" onclick="event.stopPropagation(); v23ChangeTopCalendarMonth(1)">›</button>
        </div>
        <div class="v23-cal-days">
          <div>أحد</div><div>اثنين</div><div>ثلاثاء</div><div>أربعاء</div><div>خميس</div><div>جمعة</div><div>سبت</div>
        </div>
        <div class="v23-cal-grid">${cells}</div>
        <div class="v23-cal-picked">التاريخ المختار: ${v23Label(selectedAgendaDate)}</div>
      </div>`;
  }

  window.v23ToggleTopCalendar = function(e){
    if (e) e.stopPropagation();
    if (!selectedAgendaDate) selectedAgendaDate = todayIso();
    if (!ranaCalViewDate) ranaCalViewDate = ranaParseIso(selectedAgendaDate);
    v23TopCalendarOpen = !v23TopCalendarOpen;
    renderDailySummaryV13();
    setTimeout(function(){
      const el = document.getElementById('daySummaryMountV21');
      if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
    }, 30);
  };

  window.v23ChangeTopCalendarMonth = function(delta){
    if (!ranaCalViewDate) ranaCalViewDate = ranaParseIso(selectedAgendaDate || todayIso());
    ranaCalViewDate = new Date(ranaCalViewDate.getFullYear(), ranaCalViewDate.getMonth() + delta, 1);
    v23TopCalendarOpen = true;
    renderDailySummaryV13();
  };

  window.v23PickTopDate = function(iso){
    selectedAgendaDate = iso || todayIso();
    ranaCalViewDate = ranaParseIso(selectedAgendaDate);
    currentTab = 'dateAgenda';
    v23TopCalendarOpen = false;
    if (typeof updateCleanActiveTab === 'function') updateCleanActiveTab();
    if (typeof setActiveTab === 'function') setActiveTab();
    renderDailySummaryV13();
    renderDateAgenda();
    setTimeout(function(){
      const el = document.getElementById('daySummaryMountV21');
      if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
    }, 60);
  };

  window.v22OpenTopDatePicker = window.v23ToggleTopCalendar;
  window.v21OpenDateSummary = window.v23ToggleTopCalendar;

  renderDailySummaryV13 = function(){
    if (!adminData) return;
    const mount = document.getElementById('daySummaryMountV21');
    if (!mount) return;
    const iso = selectedAgendaDate || todayIso();
    const rows = v23RowsForDate(iso, false);
    const count = rows.length;
    const first = count ? (rows[0].time || '—') : '—';
    const last = count ? (rows[count-1].time || '—') : '—';
    const totalDuration = rows.reduce(function(sum,b){ return sum + Number(b.duration || 0); }, 0);
    const title = v23IsToday(iso) ? 'ملخص اليوم ✨' : 'ملخص يوم ' + v23Label(iso) + ' ✨';
    const label = v23IsToday(iso) ? 'حجوزات اليوم' : 'حجوزات اليوم المختار';
    mount.innerHTML = `
      <div class="day-summary-v21 v22-top-summary v23-top-summary" title="اختيار تاريخ من الرزنامة">
        <div class="day-summary-head-v21">
          <div>
            <div class="day-summary-title-v21">${title}</div>
            <div class="day-summary-sub-v21">اختاري التاريخ من الزر، والحجوزات تظهر مرتبة من أول دور إلى آخر دور.</div>
          </div>
          <div class="v23-summary-actions">
            <button type="button" class="day-summary-btn-v21" onclick="v23ToggleTopCalendar(event)">اختيار يوم 📅</button>
          </div>
        </div>
        ${v23CalendarHtml()}
        <div class="day-summary-grid-v21">
          <div class="day-summary-item-v21"><strong>${count}</strong><span>${label}</span></div>
          <div class="day-summary-item-v21"><strong>${first}</strong><span>أول موعد</span></div>
          <div class="day-summary-item-v21"><strong>${last}</strong><span>آخر موعد</span></div>
          <div class="day-summary-item-v21"><strong>${ranaFormatMinutesV13(totalDuration)}</strong><span>إجمالي الوقت</span></div>
        </div>
      </div>`;
  };

  renderDateAgenda = function(){
    if (!adminData) return;
    if (!selectedAgendaDate) selectedAgendaDate = todayIso();
    const allRows = v23RowsForDate(selectedAgendaDate, true).filter(bookingMatchesSearch);
    const activeRows = allRows.filter(function(b){
      const s = String(b.status || '');
      return s !== 'ملغي' && s !== 'مرفوض';
    });
    const approved = allRows.filter(function(b){ return b.status === 'تمت الموافقة' || String(b.statusView || '').includes('زيارة'); }).length;
    const pending = allRows.filter(function(b){ return b.status === 'بانتظار الموافقة'; }).length;
    const cancelled = allRows.filter(function(b){ return b.status === 'ملغي' || b.status === 'مرفوض'; }).length;
    const title = v23IsToday(selectedAgendaDate) ? 'حجوزات اليوم' : 'حجوزات يوم ' + v23Label(selectedAgendaDate);

    document.getElementById('content').innerHTML = `
      <div class="section-head v22-agenda-head">
        <h2>${title} 📅</h2>
        <p>الحجوزات مرتبة تلقائياً من أول موعد إلى آخر موعد. لاختيار يوم آخر استخدمي زر <b>اختيار يوم</b> في ملخص اليوم بالأعلى.</p>
      </div>
      <div class="v21-date-order-note v22-date-note">
        تاريخ ${escapeHtml(v23Label(selectedAgendaDate))} — نشطة: ${activeRows.length}، مؤكدة/زيارة: ${approved}، بانتظار: ${pending}، ملغية/مرفوضة: ${cancelled}
      </div>
      ${adminSearchTerm ? `<div class="message">نتائج البحث داخل هذا التاريخ: <b>${escapeHtml(adminSearchTerm)}</b> — العدد: ${allRows.length}</div>` : ''}
      ${allRows.length ? allRows.map(card).join('') : `<div class="empty">لا توجد حجوزات في هذا التاريخ 🌸</div>`}
    `;
  };

  setAgendaDate = function(value){
    v23PickTopDate(value || todayIso());
  };

  // Ensure the new summary is rendered after loading V23
  setTimeout(function(){
    try { renderDailySummaryV13(); } catch(e) {}
    try { if (currentTab === 'dateAgenda') renderDateAgenda(); } catch(e) {}
  }, 450);
})();
</script>

<script>
/* ===== Rana V48: clean WhatsApp messages + split rejected/cancelled + sent archive ===== */
(function(){
  function v48Lines(lines){ return lines.filter(function(x){ return x !== null && x !== undefined && String(x) !== ""; }).join("\n"); }
  function v48PhoneToWa(phone){ return typeof ranaPhoneToWaV14 === "function" ? ranaPhoneToWaV14(phone) : String(phone||"").replace(/\D/g,"").replace(/^0/,"972"); }
  function v48BookingsLink(){ return "https://rana-eyebrows8.netlify.app/?myBookings=1"; }
  function v48HomeHint(){ return "للحجز مرة أخرى، ادخلي على رابط الحجز الموجود في إنستغرام."; }
  function v48IsCancelled(b){
    const s = String((b && b.status) || "");
    return s === "ملغي" || s === "Cancelled" || s === "Canceled";
  }
  function v48IsRejected(b){ return String((b && b.status) || "") === "مرفوض"; }
  function v48IsApproved(b){ return String((b && b.status) || "") === "تمت الموافقة"; }
  function v48NeedsMessage(b){ return v48IsApproved(b) || v48IsRejected(b) || v48IsCancelled(b); }
  function v48MessageTitle(b){
    if(v48IsApproved(b)) return "رسالة الموافقة";
    if(v48IsRejected(b)) return "رسالة الرفض";
    if(v48IsCancelled(b)) return "رسالة الإلغاء";
    return "رسالة واتساب";
  }

  window.ranaCustomerHomeLinkV19 = function(){ return "https://rana-eyebrows8.netlify.app/"; };
  window.ranaCustomerBookingLinkV14 = function(){ return v48BookingsLink(); };

  window.ranaBuildApprovalWhatsappUrlV14 = function(b){
    const phone = v48PhoneToWa(b && b.phone);
    if(!phone) return "";
    const msg = v48Lines([
      "✨ *تم تأكيد موعدك في Rana Eyebrows* ✨",
      "",
      "مرحباً " + ((b && b.name) || "") + " 🌸",
      "",
      "✅ موعدك صار مؤكد",
      "",
      "💅 الخدمة: " + ((b && b.service) || ""),
      "📅 التاريخ: " + ((b && b.date) || ""),
      "⏰ الساعة: " + ((b && b.time) || ""),
      (b && b.notes) ? ("📝 ملاحظات: " + b.notes) : "",
      (b && b.code) ? ("🔐 كود الحجز: " + b.code) : "",
      "",
      "📋 لإدارة حجزك أو إلغاء الموعد:",
      v48BookingsLink(),
      "",
      "🌷 يرجى الحضور قبل الموعد بـ 5 دقائق",
      "💖 بانتظارك بكل حب"
    ]);
    return "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
  };

  window.ranaBuildCancelWhatsappUrlV19 = function(b){
    const phone = v48PhoneToWa(b && b.phone);
    if(!phone) return "";
    const isRejected = v48IsRejected(b);

    const msg = isRejected ? v48Lines([
      "✨ *Rana Eyebrows* ✨",
      "",
      "مرحباً " + ((b && b.name) || "") + " 🌸",
      "",
      "نعتذر، لم نتمكن من تأكيد هذا الموعد حالياً.",
      "",
      "💅 الخدمة: " + ((b && b.service) || ""),
      "📅 التاريخ: " + ((b && b.date) || ""),
      "⏰ الساعة: " + ((b && b.time) || ""),
      (b && b.code) ? ("🔐 كود الحجز: " + b.code) : "",
      "",
      v48HomeHint(),
      "",
      "💖 بانتظارك بكل حب"
    ]) : v48Lines([
      "✨ *Rana Eyebrows* ✨",
      "",
      "مرحباً " + ((b && b.name) || "") + " 🌸",
      "",
      "تم إلغاء موعدك بنجاح.",
      "",
      "💅 الخدمة: " + ((b && b.service) || ""),
      "📅 التاريخ: " + ((b && b.date) || ""),
      "⏰ الساعة: " + ((b && b.time) || ""),
      (b && b.code) ? ("🔐 كود الحجز: " + b.code) : "",
      "",
      v48HomeHint(),
      "",
      "💖 بانتظارك بكل حب"
    ]);

    return "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
  };

  function v48SentKey(id){ return "rana_whatsapp_message_sent_v48_" + String(id || ""); }
  window.isBookingMessageSentV48 = function(b){
    if(!b || !b.id) return false;
    const serverValue = String(b.approvalSent || b.approvalWhatsappSent || b.whatsappSent || "").trim();
    if(serverValue) return serverValue === "تم الإرسال" || serverValue === "sent" || serverValue === "1" || serverValue === "true" || serverValue === "TRUE" || serverValue.includes("إرسال");
    if(typeof approvalSentKey === "function" && localStorage.getItem(approvalSentKey(b.id)) === "1") return true;
    return localStorage.getItem(v48SentKey(b.id)) === "1";
  };

  function v48FindBookingLocal(id){
    const rows = typeof allBookingsUnique === "function" ? allBookingsUnique() : [];
    id = String(id || "");
    return rows.find(function(b){ return String(b.id || "") === id; });
  }

  function v48SetMessageSentLocal(id, sent){
    const b = v48FindBookingLocal(id);
    if(b){
      b.approvalSent = sent ? "تم الإرسال" : "";
      b.approvalWhatsappSent = sent ? "تم الإرسال" : "";
      b.whatsappSent = sent ? "تم الإرسال" : "";
    }
    if(sent){
      localStorage.setItem(v48SentKey(id), "1");
      if(typeof approvalSentKey === "function") localStorage.setItem(approvalSentKey(id), "1");
    } else {
      localStorage.removeItem(v48SentKey(id));
      if(typeof approvalSentKey === "function") localStorage.removeItem(approvalSentKey(id));
    }
  }

  window.markBookingWhatsappSentV48 = async function(id){

    else if(typeof renderCurrentTab === "function") renderCurrentTab();

    try{

      if(!res.ok) throw new Error(res.error || "failed");
      adminActionToastV12 && adminActionToastV12("تم حفظ أن الرسالة أُرسلت ✅");
      if(typeof ranaBackgroundRefreshAdminData === "function") ranaBackgroundRefreshAdminData();
      return true;
    }catch(e){
      msg("تم فتح واتساب، لكن لم يتم حفظ علامة الإرسال بالشيت. الرسالة ظاهرة كمرسلة على هذا الجهاز.", true);
      return false;
    }
  };

  window.markApprovalWhatsappSentFast = window.markBookingWhatsappSentV48;

  window.normalOrApprovalWhatsApp = function(id, status, url, name){
    const title = String(status || "") === "تمت الموافقة" ? "إرسال رسالة الموافقة" :
      (String(status || "") === "مرفوض" ? "إرسال رسالة الرفض" : "إرسال رسالة الإلغاء");

    openConfirm({
      icon:"💬",
      title:title,
      text:"سيتم فتح واتساب برسالة جاهزة ومرتبة.<br>بعد الضغط سيتم تسجيل أن الرسالة أُرسلت.",
      badge:"إرسال إلى: " + escapeHtml(name || "الزبونة"),
      yesText:"فتح واتساب وتحديد كمرسل ✅",
      onConfirm:async function(){
        if(url) window.open(url, "_blank");
        await markBookingWhatsappSentV48(id);
      }
    });
  };

  window.approvalWhatsappOpen = function(id, url, name){
    normalOrApprovalWhatsApp(id, "تمت الموافقة", url, name);
  };

  function v48AllRows(){
    if(typeof allBookingsUnique === "function") return allBookingsUnique();
    return [];
  }
  function v48RowsRejected(){ return v48AllRows().filter(v48IsRejected); }
  function v48RowsCancelledOnly(){ return v48AllRows().filter(v48IsCancelled); }
  function v48RowsMessageUnsent(){
    return v48AllRows().filter(function(b){
      const sv = String(b.statusView || "");
      return v48NeedsMessage(b) && !sv.includes("زيارة") && !isBookingMessageSentV48(b);
    });
  }
  function v48RowsMessageArchive(){
    return v48AllRows().filter(function(b){
      return v48NeedsMessage(b) && isBookingMessageSentV48(b);
    });
  }

  window.sectionInfo = function(tab){
    const map={
      pending:["طلبات بانتظار الموافقة ⏳","هنا تظهر الطلبات الجديدة فقط. وافقي أو ارفضي ثم ابعتي رسالة واتساب."],
      today:["حجوزات اليوم 📌","مواعيد اليوم للمتابعة السريعة."],
      tomorrow:["حجوزات بكرا 🌸","مواعيد الغد. لإرسال تذكير، افتحي قسم تذكيرات بكرا."],
      upcoming:["كل الحجوزات القادمة 📅","كل المواعيد المستقبلية تبقى هنا حتى بعد الموافقة."],
      rejected:["حجوزات مرفوضة ❌","كل الحجوزات التي تم رفضها، مع حالة إرسال رسالة الرفض."],

<script>
let ranaConfirmResolver = null;
let ranaConfirmLastFocus = null;
function showRanaConfirm(message, title){
  const overlay = document.getElementById('ranaConfirmOverlay');
  const titleEl = document.getElementById('ranaConfirmTitle');
  const textEl = document.getElementById('ranaConfirmText');
  const okBtn = document.getElementById('ranaConfirmOkBtn');
  if(!overlay || !titleEl || !textEl || !okBtn){ return Promise.resolve(window.confirm(message || 'هل أنتِ متأكدة؟')); }
  titleEl.textContent = title || 'تأكيد الحذف';
  textEl.textContent = message || 'هل أنتِ متأكدة من متابعة الحذف؟';
  ranaConfirmLastFocus = document.activeElement;
  overlay.classList.add('show');
  overlay.setAttribute('aria-hidden','false');
  document.body.style.overflow = 'hidden';
  setTimeout(()=>okBtn.focus(), 30);
  return new Promise(resolve => { ranaConfirmResolver = resolve; });
}
function closeRanaConfirm(result){
  const overlay = document.getElementById('ranaConfirmOverlay');
  if(overlay){
    overlay.classList.remove('show');
    overlay.setAttribute('aria-hidden','true');
  }
  document.body.style.overflow = '';
  const resolver = ranaConfirmResolver;
  ranaConfirmResolver = null;
  if (ranaConfirmLastFocus && typeof ranaConfirmLastFocus.focus === 'function') {
    try { ranaConfirmLastFocus.focus(); } catch(e){}
  }
  if (resolver) resolver(!!result);
}
document.addEventListener('keydown', function(e){
  const overlay = document.getElementById('ranaConfirmOverlay');
  if(!overlay || !overlay.classList.contains('show')) return;
  if(e.key === 'Escape') closeRanaConfirm(false);
});
</script>


<script>
let ranaToastTimer = null;
function showRanaToast(message, type, duration){
  const toast = document.getElementById('ranaActionToast');
  const text = document.getElementById('ranaActionToastText');
  if(!toast || !text) return;
  clearTimeout(ranaToastTimer);
  text.textContent = message || 'تم التنفيذ';
  toast.className = 'rana-action-toast show ' + (type || 'success');
  if(duration !== 0){
    ranaToastTimer = setTimeout(function(){
      toast.classList.remove('show');
    }, duration || 2300);
  }
}
function hideRanaToast(){
  const toast = document.getElementById('ranaActionToast');
  if(toast) toast.classList.remove('show');
  clearTimeout(ranaToastTimer);
}
</script>


<script>
/* ===== Rana V49: admin counts + reliable status movement ===== */
(function(){
  window.adminFeedbackCountV49 = window.adminFeedbackCountV49 || 0;

  function v49AllRows(){
    if(typeof allBookingsUnique === 'function') return allBookingsUnique();
    if(!adminData) return [];
    return [].concat(adminData.pending||[],adminData.today||[],adminData.tomorrow||[],adminData.upcoming||[],adminData.cancelled||[],adminData.past||[]);
  }
  function v49Status(b){ return String((b && b.status) || '').trim(); }
  function v49IsRejected(b){ return v49Status(b) === 'مرفوض'; }
  function v49IsCancelled(b){ const s=v49Status(b); return s === 'ملغي' || s === 'Cancelled' || s === 'Canceled'; }
  function v49IsDone(b){ const s=v49Status(b); const sv=String((b && b.statusView)||''); return s === 'تمت الزيارة' || sv.includes('زيارة') || (s === 'تمت الموافقة' && typeof ranaIsPastDoneLocal === 'function' && ranaIsPastDoneLocal(b)); }
  function v49SortAsc(a,b){ return String((a.date||'')+' '+(a.time||'')).localeCompare(String((b.date||'')+' '+(b.time||''))); }
  function v49SortDesc(a,b){ return v49SortAsc(b,a); }
  function v49Today(){ return typeof todayIso === 'function' ? todayIso() : new Date().toISOString().slice(0,10); }
  function v49Tomorrow(){
    const d=new Date(); d.setDate(d.getDate()+1);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  window.ranaRebuildAdminBucketsLocal = function(){
    if(!adminData) return;
    const rows = v49AllRows();
    const seen = {};
    const result = { pending:[], today:[], tomorrow:[], upcoming:[], cancelled:[], past:[] };
    rows.forEach(function(b){
      if(!b || !b.id || seen[String(b.id)]) return;
      seen[String(b.id)] = true;
      const s = v49Status(b);
      const cancelledOrRejected = v49IsCancelled(b) || v49IsRejected(b);
      const done = v49IsDone(b);
      const date = String(b.date || '');

      if(s === 'بانتظار الموافقة') result.pending.push(b);
      if(date === v49Today() && !cancelledOrRejected) result.today.push(b);
      if(date === v49Tomorrow() && !cancelledOrRejected) result.tomorrow.push(b);
      if(date >= v49Today() && !cancelledOrRejected && !done) result.upcoming.push(b);
      if(cancelledOrRejected) result.cancelled.push(b);
      if(done) result.past.push(b);
    });
    result.pending.sort(v49SortAsc);
    result.today.sort(v49SortAsc);
    result.tomorrow.sort(v49SortAsc);
    result.upcoming.sort(v49SortAsc);
    result.cancelled.sort(v49SortDesc);
    result.past.sort(v49SortDesc);
    adminData = result;
  };

  window.ranaApplyStatusLocal = function(id, status){
    const rows = v49AllRows();
    const b = rows.find(function(x){ return String(x.id||'') === String(id||''); });
    if(!b) return false;
    b.status = status;
    if(typeof ranaStatusViewLocal === 'function') b.statusView = ranaStatusViewLocal(status,b);
    else b.statusView = status;
    if(status !== 'تمت الموافقة'){
      b.approvalSent = '';
      b.approvalWhatsappSent = '';
      b.whatsappSent = '';
    }
    if(typeof ranaBuildApprovalWhatsappUrlV14 === 'function' && status === 'تمت الموافقة') b.whatsapp = ranaBuildApprovalWhatsappUrlV14(b);
    if(typeof ranaBuildCancelWhatsappUrlV19 === 'function' && (status === 'مرفوض' || status === 'ملغي')) b.whatsapp = ranaBuildCancelWhatsappUrlV19(b);
    ranaRebuildAdminBucketsLocal();
    if(typeof updateAdminTabCounts === 'function') updateAdminTabCounts();
    if(typeof renderCurrentTab === 'function') renderCurrentTab();
    return true;
  };

  async function v49RefreshAdminDataAndRender(){
    try{
      const res = await api('getAdminBookings',{adminPass:getPass()});
      if(res && res.ok){
        adminData = res.data || {};
        ['pending','today','tomorrow','upcoming','cancelled','past'].forEach(function(k){ adminData[k]=adminData[k]||[]; });
        if(typeof updateAdminTabCounts === 'function') updateAdminTabCounts();
        if(currentTab === 'reminders') return loadTomorrowReminders();
        if(currentTab === 'feedbacks') return renderAdminFeedbacks();
        if(currentTab === 'archive') return renderArchiveTab();
        if(currentTab === 'dateAgenda') return renderDateAgenda();
        return renderCurrentTab();
      }
    }catch(e){}
  }
  window.v49RefreshAdminDataAndRender = v49RefreshAdminDataAndRender;

  window.setStatusNow = async function(id,status){
    const backup = adminData ? JSON.parse(JSON.stringify(adminData)) : null;
    if(typeof adminActionToastV12 === 'function') adminActionToastV12('تم تحديث الشاشة فوراً...');
    if(typeof msg === 'function') msg('جاري حفظ التغيير بالشيت...');
    const applied = ranaApplyStatusLocal(id,status);
    try{
      const res = await adminApiV12('adminUpdateStatus',{adminPass:getPass(),id:id,status:status});
      if(!res.ok) throw new Error(res.error||'failed');
      if(typeof msg === 'function') msg(res.message || 'تم الحفظ ✅');
      if(typeof adminActionToastV12 === 'function') adminActionToastV12('تم حفظ التغيير ✅');
      await v49RefreshAdminDataAndRender();
    }catch(e){
      if(backup){ adminData=backup; if(typeof renderCurrentTab === 'function') renderCurrentTab(); }

<script>
/* ===== Rana V51: Admin feedback fallback + status movement fix ===== */
(function(){
  async function v51GetFeedbackRows(){
    let res = null;

    try {
      res = await api("getAdminFeedbacks", { adminPass: getPass() });
      if (res && res.ok && Array.isArray(res.data)) return res.data;
    } catch(e) {}

    try {
      res = await api("getFeedbacks", { myCodes: "[]" });
      if (res && res.ok && Array.isArray(res.data)) return res.data;
    } catch(e) {}

    return [];
  }

  window.v51GetFeedbackRows = v51GetFeedbackRows;

  window.renderAdminFeedbacks = async function(){
    currentTab = "feedbacks";
    if (typeof setActiveTab === "function") setActiveTab();
    if (typeof updateCleanActiveTab === "function") updateCleanActiveTab();

    const content = document.getElementById("content");
    if (!content) return;

    content.innerHTML = `
      <div class="section-head">
        <h2>إدارة التقييمات ⭐</h2>
        <p>جاري تحميل التقييمات...</p>
      </div>
      <div class="message">جاري تحميل التقييمات...</div>
    `;

    try {
      const rows = await v51GetFeedbackRows();
      window.adminFeedbackCountV51 = rows.length;
      if (typeof setTabCount === "function") setTabCount("feedbacks", rows.length);

      if (!rows.length) {
        content.innerHTML = `
          <div class="section-head">
            <h2>إدارة التقييمات ⭐</h2>
            <p>لا توجد تقييمات ظاهرة حالياً.</p>
          </div>
          <div class="empty">لا توجد تقييمات ظاهرة 🌸</div>
        `;
        return;
      }

      content.innerHTML = `
        <div class="section-head">
          <h2>إدارة التقييمات ⭐</h2>
          <p>عدد التقييمات الظاهرة: ${rows.length}. يمكنك حذف أي تقييم غير مناسب.</p>
        </div>
        ${rows.map(function(r){
          const rating = Math.max(1, Math.min(5, Number(r.rating) || 5));
          const code = escapeHtml(r.deleteCode || "");
          return `
            <div class="admin-card">
              <h3>${escapeHtml(r.name || "زبونة")} — ${"★".repeat(rating)}${"☆".repeat(5-rating)}</h3>
              <div class="details">
                ${r.createdAt ? `<div><b>التاريخ:</b> ${escapeHtml(r.createdAt)}</div>` : ""}
                <div><b>التعليق:</b> ${escapeHtml(r.comment || "")}</div>
              </div>
              <div class="actions">
                <button class="red" onclick="adminDeleteFeedback('${code}')">حذف التقييم 🗑️</button>
              </div>
            </div>
          `;
        }).join("")}
      `;
    } catch(e) {
      content.innerHTML = `
        <div class="section-head">
          <h2>إدارة التقييمات ⭐</h2>
          <p>حدث خطأ بتحميل التقييمات.</p>
        </div>
        <div class="message error">${escapeHtml(e.message || "error")}</div>
      `;
    }
  };

  window.adminDeleteFeedback = async function(code){
    if (!code) return;
    if (!(await showRanaConfirm("هل أنتِ متأكدة من حذف هذا التقييم؟ لا يمكن التراجع بعد الحذف.", "حذف تقييم"))) return;

    if (typeof showRanaToast === "function") showRanaToast("جاري حذف التقييم...", "loading", 0);

    try {
      let res = null;
      try {
        res = await api("adminDeleteFeedback", { adminPass: getPass(), deleteCode: code });
      } catch(e) {}

      if (!res || !res.ok) {
        res = await api("deleteFeedback", { deleteCode: code, code: code });
      }

      if (!res || !res.ok) throw new Error((res && res.error) || "failed");

      if (typeof showRanaToast === "function") showRanaToast("تم حذف التقييم بنجاح ✅", "success", 2400);
      if (typeof msg === "function") msg("تم حذف التقييم ✅");

      await renderAdminFeedbacks();
      await loadAdminFeedbackCountV51();
    } catch(e) {
      if (typeof showRanaToast === "function") showRanaToast("تعذر حذف التقييم", "error", 3200);
      if (typeof msg === "function") msg("تعذر حذف التقييم", true);
    }
  };

  async function loadAdminFeedbackCountV51(){
    try {
      const rows = await v51GetFeedbackRows();
      window.adminFeedbackCountV51 = rows.length;
      if (typeof setTabCount === "function") setTabCount("feedbacks", rows.length);
    } catch(e) {
      if (typeof setTabCount === "function") setTabCount("feedbacks", window.adminFeedbackCountV51 || 0);
    }
  }

  window.loadAdminFeedbackCountV51 = loadAdminFeedbackCountV51;

  const oldUpdateCountsV51 = window.updateAdminTabCounts;
  window.updateAdminTabCounts = function(){
    try { if (oldUpdateCountsV51) oldUpdateCountsV51.apply(this, arguments); } catch(e) {}
    try {
      if (typeof setTabCount === "function") {
        setTabCount("feedbacks", window.adminFeedbackCountV51 || window.adminFeedbackCountV49 || 0);
      }
    } catch(e) {}
  };

  function v51RepaintCurrent(){
    if (typeof updateAdminTabCounts === "function") updateAdminTabCounts();
    if (typeof renderCurrentTab === "function") renderCurrentTab();
  }

  const oldSetStatusV51 = window.setStatusNow;
  window.setStatusNow = async function(id, status){
    const backup = adminData ? JSON.parse(JSON.stringify(adminData)) : null;

    try {
      if (typeof ranaApplyStatusLocal === "function") {
        ranaApplyStatusLocal(id, status);
      } else {
        const b = typeof ranaFindBookingLocal === "function" ? ranaFindBookingLocal(id) : null;
        if (b) {
          b.status = status;
          if (typeof ranaStatusViewLocal === "function") b.statusView = ranaStatusViewLocal(status, b);
          b.approvalSent = "";
          b.approvalWhatsappSent = "";
        }
        if (typeof ranaRebuildAdminBucketsLocal === "function") ranaRebuildAdminBucketsLocal();
        v51RepaintCurrent();
      }
    } catch(e) {}

    if (typeof adminActionToastV12 === "function") adminActionToastV12("تم تحديث الشاشة فوراً...");
    if (typeof msg === "function") msg("جاري حفظ التغيير بالشيت...");

    try {
      const res = await adminApiV12("adminUpdateStatus", { adminPass: getPass(), id: id, status: status });
      if (!res || !res.ok) throw new Error((res && res.error) || "failed");

      if (typeof msg === "function") msg(res.message || "تم الحفظ ✅");
      if (typeof adminActionToastV12 === "function") adminActionToastV12("تم حفظ التغيير ✅");

      // تحديث كامل سريع بالخلفية حتى كل الخانات تنتقل صح 100%
      setTimeout(async function(){
        try {
          const fresh = await api("getAdminBookings", { adminPass: getPass() });
          if (fresh && fresh.ok) {
            adminData = fresh.data || {};
            ["pending","today","tomorrow","upcoming","cancelled","past"].forEach(function(k){ adminData[k] = adminData[k] || []; });
            v51RepaintCurrent();
          }
        } catch(e) {}
      }, 600);

    } catch(e) {
      if (backup) {
        adminData = backup;
        v51RepaintCurrent();
      }
      if (typeof msg === "function") msg("صار خطأ بتحديث الحالة، رجّعنا الشاشة مثل ما كانت.", true);
      if (typeof adminActionToastV12 === "function") adminActionToastV12("تعذر تحديث الحجز");
    }
  };

  setTimeout(loadAdminFeedbackCountV51, 900);
})();
</script>

      const hasPassInput = !!document.getElementById('adminPass');
      const hasWrong = text.includes('كلمة السر غير صحيحة') || !!document.querySelector('.password-error-card');
      if(hasPassInput && hasWrong && !manualLoginV90){
        sessionStorage.removeItem('ranaAdminPass');

        return oldLoginPage.apply(this, arguments);

    const oldDoLogin = window.doLogin;

})();

<script id="rana-v133-clean-whatsapp-message-format">
/* V133: clean WhatsApp message layout only — content stays the same */
(function(){
  function phoneToWa(phone){
    try{
      if(typeof ranaPhoneToWaV14 === "function") return ranaPhoneToWaV14(phone);
    }catch(e){}
    return String(phone || "").replace(/\D/g, "").replace(/^0/, "972");
  }

  function bookingsLink(){
    return "https://rana-eyebrows8.netlify.app/?myBookings=1";
  }

  function homeHint(){
    return "للحجز مرة أخرى، ادخلي على رابط الحجز الموجود في إنستغرام.";
  }

  function cleanLine(s){
    return String(s || "").replace(/\s+/g, " ").trim();
  }

  function serviceLines(serviceText){
    var text = cleanLine(serviceText);
    if(!text) return ["💅 الخدمة:"];

    var dashMatch = text.match(/^(.*?)\s*[—-]\s*(.+)$/);
    var main = dashMatch ? cleanLine(dashMatch[1]) : text;
    var rest = dashMatch ? cleanLine(dashMatch[2]) : "";

    var out = ["💅 الخدمة: " + main];

    if(rest){
      var people = rest.split(/\s*\|\s*/).map(cleanLine).filter(Boolean);
      people.forEach(function(part){
        var m = part.match(/^([^:：]+)[:：]\s*(.+)$/);
        if(m){
          out.push("👤 " + cleanLine(m[1]) + " — " + cleanLine(m[2]));
        }else{
          out.push("👤 " + part);
        }
      });
    }

    return out;
  }

  function lines(arr){
    return arr.filter(function(x){
      return x !== null && x !== undefined && String(x).trim() !== "";
    }).join("\n");
  }

  function encodeWa(phone, msg){
    return "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
  }

    b = b || {};

<script>
/* ===== Rana V84: cleaner admin groups + worker subfilters + top date/work summary ===== */
(function(){
  let v84ExtraFilter = '';     // '', nails, beauty
  let v84DayFilter = 'all';    // all, nails, beauty
  let v84SelectedDate = (typeof todayIso === 'function') ? todayIso() : new Date().toISOString().slice(0,10);

  function v84SafeRows(){
    try { if (typeof allBookingsUnique === 'function') return allBookingsUnique() || []; } catch(e){}
    const d = window.adminData || (typeof adminData !== 'undefined' ? adminData : {}) || {};
    const rows = [].concat(d.pending||[], d.today||[], d.tomorrow||[], d.upcoming||[], d.cancelled||[], d.past||[]);
    const seen = {};
    return rows.filter(function(b){ const k = String((b && (b.id || b.code)) || JSON.stringify(b)); if(seen[k]) return false; seen[k]=1; return true; });
  }
  function v84Text(b){ return String([b && b.service, b && b.serviceText, b && b.notes, b && b.type, b && b.mode].join(' ')).toLowerCase(); }
  function v84Status(b){ return String(((b && b.statusView) || '') + ' ' + ((b && b.status) || '')).toLowerCase(); }
  function v84IsCombo(b){ const s=v84Text(b); return s.includes('مشترك') || s.includes('combo'); }
  function v84HasNails(b){ const s=v84Text(b); return s.includes('أظافر') || s.includes('اظافر') || s.includes('nail') || v84IsCombo(b); }
  function v84HasBeauty(b){ const s=v84Text(b); return s.includes('حواجب') || s.includes('رموش') || s.includes('شفايف') || s.includes('brow') || s.includes('lash') || s.includes('lip') || v84IsCombo(b); }
  function v84IsRejected(b){ return String((b && b.status) || '') === 'مرفوض' || v84Status(b).includes('مرفوض') || v84Status(b).includes('رفض'); }
  function v84IsCancelled(b){ const s=String((b && b.status) || ''); return s === 'ملغي' || s === 'Cancelled' || s === 'Canceled' || v84Status(b).includes('ملغي') || v84Status(b).includes('إلغاء'); }
  function v84IsVisitDone(b){ const st=v84Status(b); return st.includes('زيارة') || st.includes('انته'); }
  function v84IsFinished(b){
    if (v84IsRejected(b) || v84IsCancelled(b) || v84IsVisitDone(b)) return true;
    try { if (typeof parseBookingDate === 'function') { const dt=parseBookingDate(b); return !!dt && dt.getTime() < Date.now(); } } catch(e){}
    return false;
  }
  function v84NeedsMessage(b){ const s=String((b && b.status) || ''); return s === 'تمت الموافقة' || v84IsRejected(b) || v84IsCancelled(b); }
  function v84MessageSent(b){ try { return typeof isBookingMessageSentV48 === 'function' && isBookingMessageSentV48(b); } catch(e){ return false; } }
  function v84ActiveRows(){ return v84SafeRows().filter(function(b){ return !v84IsFinished(b); }); }
  function v84WorkerFilter(rows, type){
    if (type === 'nails') return (rows||[]).filter(v84HasNails);
    if (type === 'beauty') return (rows||[]).filter(v84HasBeauty);
    return rows || [];
  }
  function v84RowsForTab(tab){
    const all = v84SafeRows();
    const active = v84ActiveRows();
    if(tab === 'allWork') return active;
    if(tab === 'nailsWork') return active.filter(v84HasNails);
    if(tab === 'beautyWork') return active.filter(v84HasBeauty);
    if(tab === 'cancelled') return all.filter(v84IsCancelled);
    if(tab === 'rejected') return all.filter(v84IsRejected);
    if(tab === 'messageArchive') return all.filter(function(b){ return v84NeedsMessage(b) && v84MessageSent(b); });
    if(tab === 'archive') return all.filter(v84IsFinished);
    if(tab === 'dateWork') return v84RowsBySelectedDate();
    return null;
  }
  function v84Sort(rows){
    try { if (typeof ranaSortNearestFirst === 'function') return ranaSortNearestFirst((rows || []).slice()); } catch(e){}
    return (rows||[]).slice().sort(function(a,b){ return String((a.date||'')+' '+(a.time||'')).localeCompare(String((b.date||'')+' '+(b.time||''))); });
  }
  function v84DurationMin(b){
    const raw = String((b && b.duration) || '').trim();
    const n = parseInt(raw.replace(/[^0-9]/g,''),10);
    return isNaN(n) ? 0 : n;
  }
  function v84FormatMinutes(n){
    n = Number(n)||0;
    const h = Math.floor(n/60), m = n%60;
    if(h && m) return h + 'س ' + m + 'د';
    if(h) return h + 'س';
    return m + 'د';
  }
  function v84RowsBySelectedDate(){
    const target = String(v84SelectedDate || '');
    let rows = v84SafeRows().filter(function(b){
      const status = String((b && b.status) || '').trim();
      const sameDate = String((b && b.date) || '') === target;
      const activeStatus = (status === 'تمت الموافقة' || status === 'بانتظار الموافقة');
      return sameDate && activeStatus && !v84IsRejected(b) && !v84IsCancelled(b) && !v84IsVisitDone(b);
    });
    return v84WorkerFilter(rows, v84DayFilter);
  }
  function v84DayStats(){
    const rows = v84Sort(v84RowsBySelectedDate());
    const first = rows[0] ? String(rows[0].time || '-') : '-';
    const last = rows[rows.length-1] ? String(rows[rows.length-1].time || '-') : '-';
    const total = rows.reduce(function(sum,b){ return sum + v84DurationMin(b); }, 0);
    return {rows, count: rows.length, first, last, total};
  }
  function v84WorkerLabel(type){ return type === 'nails' ? 'الأظافر' : (type === 'beauty' ? 'التجميل' : 'الكل'); }
  function v84DatePanelHtml(){
    return `
      <div class="v84-date-panel">
        <div class="v84-date-head">
          <div><b>📅 ملخص يوم حسب القسم</b><small>اختاري التاريخ ثم اضغطي عرض الحجوزات — يظهر فقط الموافق عليها وبانتظار الموافقة</small></div>
          <button type="button" onclick="v84ShowDateWork()">عرض حجوزات هذا اليوم ✨</button>
        </div>
        <div class="v84-date-controls">
          <label>اختيار التاريخ <input id="v84DateInput" type="date" value="${v84SelectedDate}" onchange="v84SetDate(this.value)"></label>
          <div class="v84-segment">
            <button id="v84-day-all" type="button" onclick="v84SetDayFilter('all')">📋 الكل</button>
            <button id="v84-day-nails" type="button" onclick="v84SetDayFilter('nails')">💅 الأظافر</button>
            <button id="v84-day-beauty" type="button" onclick="v84SetDayFilter('beauty')">🌸 التجميل</button>
          </div>
        </div>
        <div class="v84-summary-cards">

<script>

(function(){

  function parseIso(s){
    s=String(s||'').trim();
    let m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/); if(m) return new Date(+m[1], +m[2]-1, +m[3]);
    m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); if(m) return new Date(+m[3], +m[2]-1, +m[1]);
    const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),d.getDate());

    const pop=document.createElement('div'); pop.className='v86-calendar-pop'; pop.id='v86CalendarPop'; wrap.appendChild(pop);

    render(inp);

    setTimeout(function(){ const i=document.getElementById('v84DateInput'); if(i){i.dataset.iso=val; i.value=fmt(val);} }, 60);
  }
  function render(inp){
    const pop=document.getElementById('v86CalendarPop'); if(!pop || !inp) return;
    const selected = inp.dataset.iso || iso(parseIso(inp.value));
    const d = calMonth || parseIso(selected);
    const y=d.getFullYear(), m=d.getMonth();
    const first=new Date(y,m,1); const start=first.getDay();
    const daysIn=new Date(y,m+1,0).getDate(); const daysPrev=new Date(y,m,0).getDate();
    const today=iso(new Date());
    let cells='';
    for(let i=0;i<42;i++){
      let day, cm=m, cy=y, muted=false;
      if(i<start){ day=daysPrev-start+i+1; cm=m-1; muted=true; if(cm<0){cm=11; cy=y-1;} }
      else if(i>=start+daysIn){ day=i-start-daysIn+1; cm=m+1; muted=true; if(cm>11){cm=0; cy=y+1;} }
      else day=i-start+1;
      const val=cy+'-'+pad(cm+1)+'-'+pad(day);
      cells += `<div class="v86-day ${muted?'muted':''} ${val===today?'today':''} ${val===selected?'selected':''}" onclick="v86AdminPickDate('${val}')">${day}</div>`;
    }
    pop.innerHTML = `<div class="v86-cal-head"><button class="v86-cal-nav" type="button" onclick="v86AdminMoveMonth(-1)">›</button><div class="v86-cal-title">${monthNames[m]} ${y}</div><button class="v86-cal-nav" type="button" onclick="v86AdminMoveMonth(1)">‹</button></div><div class="v86-weekdays">${week.map(w=>`<div>${w.slice(0,3)}</div>`).join('')}</div><div class="v86-days">${cells}</div><div class="v86-cal-foot"><button type="button" class="ghost" onclick="v86AdminPickDate('${today}')">اليوم</button><button type="button" onclick="v86AdminCloseCalendar()">إغلاق</button></div>`;
  }
  window.v86AdminMoveMonth=function(step){ const inp=document.getElementById('v84DateInput'); const base=calMonth || parseIso((inp&&inp.dataset.iso)||''); calMonth=new Date(base.getFullYear(), base.getMonth()+step, 1); render(inp); };
  window.v86AdminPickDate=selectDate;
  window.v86AdminCloseCalendar=close;
  document.addEventListener('click', function(e){ const pop=document.getElementById('v86CalendarPop'); const wrap=document.querySelector('.v86-date-wrap'); if(pop && wrap && !wrap.contains(e.target)) close(); });
  const oldLayout=window.layout;
  if(oldLayout){ window.layout=function(){ const res=oldLayout.apply(this,arguments); setTimeout(ensure,80); return res; }; }
  const mo=new MutationObserver(function(){ ensure(); }); mo.observe(document.documentElement,{childList:true,subtree:true});
  setInterval(function(){ const inp=document.getElementById('v84DateInput'); if(inp && inp.dataset.v86Ready==='1' && /^\d{4}-\d{2}-\d{2}$/.test(inp.value)){ inp.dataset.iso=inp.value; inp.value=fmt(inp.dataset.iso); } }, 400);
  setTimeout(ensure,300);
})();
</script>
